name: GCS Integration Testing Pipeline

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Node Dependencies
        run: npm ci

      - name: Install Playwright Browsers & System Dependencies
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Install Playwright System Deps Only
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Run Integration Tests
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" -- npm run test:integration

      - name: Upload Test Report Excel
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-report
          path: test_frontend/reports/integration_test_report.xlsx
          retention-days: 14

      - name: Upload Playwright Diagnostics (On Failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-diagnostics
          path: |
            test-results/
            playwright-report/
          retention-days: 14
